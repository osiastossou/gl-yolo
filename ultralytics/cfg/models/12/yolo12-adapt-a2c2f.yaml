  - [-1, 1, Conv,        [128, 3, 2]]
  - [-1, 2, C3k2,        [256, False, 0.25]]
  - [-1, 1, SPDConv,     [256]]               # SPDConv sur P3
  - [-1, 2, C3k2,        [512, False, 0.25]]
  - [-1, 1, Conv,        [512, 3, 2]]
  - [-1, 4, AdaptA2C2f,  [512, True, 4]]      # area adaptatif P4
  - [-1, 1, Conv,        [1024, 3, 2]]
  - [-1, 4, AdaptA2C2f,  [1024, True, 1]]     # area adaptatif P5

head:
